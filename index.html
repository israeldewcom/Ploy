<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>API CORS Test</title></head>
<body>
  <h2>Step 1 – Health Check (GET)</h2>
  <pre id="out1">Testing...</pre>
  <hr>
  <h2>Step 2 – Login (POST)</h2>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="pw" type="password" placeholder="Password"><br>
  <button onclick="testLogin()">Login</button>
  <pre id="out2"></pre>
  <script>
    const BASE = 'https://changex-backend-etfk.onrender.com/api/v1';

    // Auto‑test the GET request
    fetch(BASE + '/health')
      .then(r => r.json())
      .then(data => { document.getElementById('out1').textContent = '✅ GET works: ' + JSON.stringify(data); })
      .catch(e => { document.getElementById('out1').textContent = '❌ GET failed: ' + e.message; });

    async function testLogin() {
      const email = document.getElementById('email').value;
      const pw = document.getElementById('pw').value;
      try {
        const res = await fetch(BASE + '/auth/login', {
          method: 'POST',
          headers: {'Content-Type': 'application/json'},
          body: JSON.stringify({email, password: pw})
        });
        const data = await res.json();
        document.getElementById('out2').textContent = '✅ POST works: ' + JSON.stringify(data, null, 2);
      } catch(e) {
        document.getElementById('out2').textContent = '❌ POST failed: ' + e.message;
      }
    }
  </script>
</body>
</html>
