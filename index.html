<!DOCTYPE html>
<html>
<head><meta charset="utf-8"><title>Final API Test</title></head>
<body>
  <h2>1. Health Check (GET)</h2>
  <pre id="out-get">Testing...</pre>
  <hr>
  <h2>2. Login (POST)</h2>
  <input id="email" type="email" placeholder="Email"><br>
  <input id="pw" type="password" placeholder="Password"><br>
  <button onclick="testPost()">Login</button>
  <pre id="out-post"></pre>
  <script>
    const BASE = 'https://changex-backend-etfk.onrender.com/api/v1';
    const HEALTH_URL = 'https://changex-backend-etfk.onrender.com/health';

    // Test GET health
    fetch(HEALTH_URL)
      .then(r => r.json())
      .then(d => { document.getElementById('out-get').textContent = '✅ Health OK: ' + JSON.stringify(d); })
      .catch(e => { document.getElementById('out-get').textContent = '❌ Health FAIL: ' + e.message; });

    async function testPost() {
      const email = document.getElementById('email').value;
      const pw = document.getElementById('pw').value;
      try {
        const res = await fetch(BASE+'/auth/login', {
          method: 'POST',
          headers: {'Content-Type':'application/json'},
          body: JSON.stringify({email, password:pw})
        });
        const data = await res.json();
        document.getElementById('out-post').textContent = JSON.stringify(data, null, 2);
      } catch(e) {
        document.getElementById('out-post').textContent = 'Error: ' + e.message;
      }
    }
  </script>
</body>
</html>
